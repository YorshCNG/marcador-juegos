<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configurar partida</title>

<link rel="stylesheet" href="/marcador-juegos/css/configurarPartida.css?v=7">

</head>

<body>

<div class="container">

<h1 id="tituloJuego"></h1>

<!-- PASO 1 -->
<div id="paso1" class="paso">
    <h3>Paso 1</h3>
    <div id="configuracionJuego" class="configuracionJuego"></div>
    <button id="btnPaso1">Siguiente</button>
</div>

<!-- PASO 2 -->
<div id="paso2" class="paso" style="display:none;">
    <h3>Paso 2</h3>
    <input type="text" id="nombreJugador" placeholder="Nombre del jugador">
    <button id="agregarJugador">Agregar</button>

    <ul id="listaJugadores"></ul>

    <button id="btnPaso2">Siguiente</button>
</div>

<!-- PASO 3 -->
<div id="paso3" class="paso" style="display:none;">
    <h3>Paso 3</h3>
    <div id="resumen"></div>
    <button id="btnIniciar">Iniciar partida</button>
</div>
</div>

<div id="toast" class="toast"></div>

<script src="/marcador-juegos/js/configurarPartida.js"></script>
    
</body>

</html>
