<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nueva Partida</title>

<link rel="stylesheet" href="/marcador-juegos/css/partida.css?v=9">

</head>

<body>

<div class="container">

    <h1 id="tituloJuego"></h1>

    <div id="infoJuego" class="infoJuego"></div>

    <h2>Jugadores</h2>

    <ul id="listaJugadores"></ul>

</div>

<!-- BOTONES FIJOS -->
<div class="acciones">

    <button id="btnRonda">Siguiente ronda</button>

    <button id="finalizarPartida">Finalizar partida</button>

</div>

<!-- MODAL PUNTAJES -->
<div id="modalPuntajes" class="modal">
    <div class="modalContenido">

        <h2>Ingresar puntajes</h2>

        <div id="inputsPuntajes"></div>

        <button id="guardarPuntajes">Continuar</button>

    </div>
</div>

<!-- MODAL RESULTADO -->
<div id="modalResultado" class="modal">
    <div class="modalContenido">

        <h2 id="tituloResultado"></h2>
        <p id="textoResultado"></p>

<button id="btnNuevaPartida">
    Nueva partida
</button>

    </div>
</div>

<div id="toast" class="toast"></div>
    
<!-- 🔥 SCRIPT SIEMPRE AL FINAL -->
<script src="/marcador-juegos/js/partida.js"></script>

</body>
</html>
